<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Behobia">
  <meta name="theme-color" content="#0B3560">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Half Marathon — Nov 22, 2026</title>
  <style>
    :root {
      --bg:       #FFFFFF;
      --surface:  #FFFFFF;
      --navy:     #0B3560;
      --navy2:    #174B82;
      --blue-bg:  #E4EEF8; --blue-tx: #0D3D78; --blue-bd: #2473BE;
      --grn-bg:   #FEE2E2; --grn-tx:  #991B1B; --grn-bd:  #EF4444;
      --grey-bg:  #FFFFFF; --grey-tx: #6B7280; --grey-bd: #D1D5DB;
      --race-bg:  #FEF9C3; --race-tx: #854D0E; --race-bd: #EAB308;
      --done-bg:  #D8F2E5; --done-tx: #0A5C2A; --done-bd: #1B8A4E;
      --ph1-bg:#E4EEF8; --ph1-tx:#0D3D78; --ph1-bd:#2473BE;
      --ph2-bg:#E3EFE5; --ph2-tx:#174D22; --ph2-bd:#2B7A38;
      --ph3-bg:#FEF2E1; --ph3-tx:#6B3900; --ph3-bd:#BE7610;
      --ph4-bg:#F5E5E8; --ph4-tx:#791C2B; --ph4-bd:#B72434;
      --text:  #1A1917;
      --text2: #55534F;
      --text3: #8C8A85;
      --r-sm: 8px; --r-md: 12px; --r-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #1A1917; }
    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      overscroll-behavior: none;
    }
    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    /* ── Header ─────────────────────────────────── */
    .hdr {
      background: var(--navy);
      padding: 14px 16px 12px;
      padding-top: max(14px, env(safe-area-inset-top, 14px));
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hdr-eye {
      font-size: 10px; font-weight: 700; letter-spacing: .13em;
      text-transform: uppercase; color: #85B5E8; margin-bottom: 3px;
    }
    .hdr-row { display: flex; justify-content: space-between; align-items: flex-end; }
    .hdr-title {
      font-size: 20px; font-weight: 800; color: #fff;
      letter-spacing: -.025em; line-height: 1.1;
    }
    .hdr-countdown { text-align: right; }
    .hdr-days {
      font-size: 22px; font-weight: 800; color: #fff; line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .hdr-dlabel { font-size: 10px; color: #85B5E8; font-weight: 600; letter-spacing: .05em; }

    /* ── Calendar view ───────────────────────────── */
    #cal-view { padding: 0 12px; padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)); }

    .legend {
      display: flex; gap: 12px; flex-wrap: wrap;
      padding: 11px 4px 9px;
      border-bottom: 1px solid #DDDBD5;
      margin-bottom: 12px;
    }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); font-weight: 500; }
    .leg-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

    .mnav { display: flex; align-items: center; justify-content: space-between; padding: 0 4px; margin-bottom: 10px; }
    .mnav-btn {
      background: none; border: none; font-size: 24px; line-height: 1;
      color: var(--navy); cursor: pointer; padding: 5px 8px; border-radius: 8px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .mnav-btn:disabled { color: #CAC8C2; }
    .mnav-btn:active:not(:disabled) { background: #DDD; }
    .mnav-title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }

    .dhdrs {
      display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-bottom: 4px;
    }
    .dhdrs span {
      text-align: center; font-size: 10px; font-weight: 600;
      color: var(--text3); padding: 4px 0; letter-spacing: .04em;
    }
    .cgrid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .ccell {
      aspect-ratio: 1; border-radius: 9px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; border: 1.5px solid transparent;
      position: relative; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      user-select: none; cursor: default; transition: opacity .12s;
    }
    .ccell.active { cursor: pointer; }
    .ccell.active:active { opacity: .72; }
    .ccell .cnum {
      font-size: 12px; font-weight: 500; line-height: 1;
    }
    .ccell .cico { font-size: 11px; line-height: 1; margin-top: 2px; }
    .ccell.today-ring {
      outline: 2.5px solid var(--done-bd); outline-offset: -2px;
    }

    /* Phase cards */
    .phases-wrap { margin-top: 20px; padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)); }
    .sec-label {
      font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: .12em;
      text-transform: uppercase; padding: 0 4px; margin-bottom: 8px;
    }
    .phase-card {
      border-radius: var(--r-md); padding: 11px 14px; margin-bottom: 6px;
      border: 1px solid transparent;
    }
    .phase-card-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
    .phase-card-name { font-size: 13px; font-weight: 700; }
    .phase-card-wks { font-size: 11px; opacity: .7; font-weight: 600; }
    .phase-card-desc { font-size: 12px; opacity: .85; line-height: 1.45; }

    /* ── Detail view ─────────────────────────────── */
    #det-view {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      /* Contain to max-width on desktop */
      max-width: 430px; left: 50%; margin-left: -215px;
    }
    #det-view.open { transform: translateX(0); }
    @media (max-width: 430px) {
      #det-view { left: 0; margin-left: 0; }
    }

    .det-hbar {
      background: var(--navy);
      padding: 10px 16px 12px;
      padding-top: max(10px, env(safe-area-inset-top, 10px));
      position: sticky; top: 0; z-index: 10;
    }
    .back-btn {
      background: none; border: none; color: #85B5E8; font-size: 14px; font-weight: 600;
      cursor: pointer; padding: 5px 0; display: flex; align-items: center; gap: 6px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .back-btn:active { opacity: .7; }
    .det-date { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.02em; margin-top: 4px; }

    .det-body {
      padding: 12px 14px;
      padding-bottom: max(80px, calc(60px + env(safe-area-inset-bottom, 20px)));
    }

    /* Workout header card */
    .wo-card {
      border-radius: var(--r-lg); padding: 18px 16px 14px;
      margin-bottom: 10px; border: 1px solid transparent;
    }
    .wo-week-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; opacity: .6; margin-bottom: 4px;
    }
    .wo-title { font-size: 22px; font-weight: 800; letter-spacing: -.025em; margin-bottom: 10px; }
    .pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      background: rgba(255,255,255,.5); border-radius: 20px;
      padding: 4px 11px; font-size: 12px; font-weight: 600;
    }

    /* Generic section card */
    .scard {
      background: var(--surface); border: 1px solid #DDDBD5;
      border-radius: var(--r-lg); padding: 14px 16px; margin-bottom: 10px;
    }
    .scard-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
    }
    .scard-body { font-size: 14px; color: var(--text); line-height: 1.65; }

    /* Variation picker */
    .var-btn {
      width: 100%; background: #F6F5F2; border: 1.5px solid #DDDBD5;
      border-radius: 10px; padding: 10px 12px; text-align: left;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
      margin-bottom: 6px; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .var-btn:last-child { margin-bottom: 0; }
    .var-radio { font-size: 15px; line-height: 1; flex-shrink: 0; }
    .var-name { font-size: 13px; color: var(--text); font-weight: 400; }
    .var-btn.sel .var-name { font-weight: 700; }

    /* Done button */
    .done-btn {
      width: 100%; border-radius: var(--r-lg); padding: 16px;
      border: 1.5px solid #DDDBD5; background: var(--surface);
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent; margin-bottom: 10px;
    }
    .done-btn.done { background: #E6F7EF; border-color: var(--done-bd); }
    .done-btn:active { opacity: .8; }
    .done-check {
      width: 26px; height: 26px; border-radius: 7px; border: 2px solid #C0BDB6;
      background: transparent; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .done-btn.done .done-check { background: #1B8A4E; border-color: #1B8A4E; }
    .done-check-mark {
      display: none; color: #fff; font-size: 14px; font-weight: 800; line-height: 1;
    }
    .done-btn.done .done-check-mark { display: block; }
    .done-lbl { font-size: 15px; font-weight: 700; color: var(--text2); }
    .done-btn.done .done-lbl { color: #0F5C30; }

    /* Phase badge */
    .ph-badge { border-radius: var(--r-lg); padding: 12px 14px; margin-bottom: 10px; border: 1px solid transparent; }
    .ph-badge-name { font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 3px; }
    .ph-badge-desc { font-size: 13px; line-height: 1.45; }
    .recovery-tag {
      display: inline-block; background: #FEF2E1; border-radius: 6px;
      padding: 3px 9px; font-size: 11px; font-weight: 700;
      color: #7A4800; margin-top: 8px;
    }

    /* Days to race */
    .race-chip {
      background: var(--surface); border: 1px solid #DDDBD5;
      border-radius: var(--r-lg); padding: 12px 16px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .race-chip-lbl { font-size: 13px; color: var(--text2); }
    .race-chip-num { font-size: 22px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }

    /* ── Bottom Navigation ──────────────────────── */
    .view { display: none; }
    .view.active { display: block; }

    #bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--surface); border-top: 1px solid #DDDBD5;
      display: flex; z-index: 150;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 8px 4px 9px; background: none;
      border: none; cursor: pointer; gap: 3px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      color: var(--text3);
    }
    .tab-btn.active { color: var(--navy); }
    .tab-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
    .tab-label { font-size: 10px; font-weight: 600; letter-spacing: .02em; }
    .tab-btn.active .tab-label { color: var(--navy); }

    /* ── Progress View ──────────────────────────── */
    #progress-view { padding: 0 12px; padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)); }
    .progress-hero {
      background: var(--navy); border-radius: var(--r-lg);
      padding: 22px 20px 18px; margin: 12px 0; color: #fff; text-align: center;
    }
    .hero-pct { font-size: 56px; font-weight: 800; letter-spacing: -.03em; line-height: 1; }
    .hero-lbl { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; opacity: .65; margin-top: 2px; }
    .hero-sub { font-size: 12px; opacity: .6; margin-top: 10px; }
    .hero-bar-bg { background: rgba(255,255,255,.2); border-radius: 99px; height: 8px; margin-top: 14px; overflow: hidden; }
    .hero-bar-fill { height: 100%; border-radius: 99px; background: #fff; transition: width .5s ease; }
    .phase-prog { border-radius: var(--r-md); padding: 13px 14px; margin-bottom: 7px; border: 1px solid transparent; }
    .phase-prog-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
    .phase-prog-name { font-size: 13px; font-weight: 700; }
    .phase-prog-count { font-size: 12px; opacity: .7; font-weight: 600; }
    .phase-prog-desc { font-size: 12px; opacity: .85; line-height: 1.5; margin-bottom: 10px; }
    .pbar-bg { background: rgba(0,0,0,.1); border-radius: 99px; height: 7px; overflow: hidden; }
    .pbar-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }

    /* ── Diary View ─────────────────────────────── */
    #diary-view { padding: 0 12px; padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)); }
    .diary-new {
      background: var(--surface); border: 1px solid #DDDBD5;
      border-radius: var(--r-lg); padding: 14px 16px; margin: 12px 0 10px;
    }
    .diary-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .diary-row-lbl { font-size: 13px; font-weight: 500; color: var(--text2); flex-shrink: 0; }
    .diary-date-inp {
      flex: 1; border: 1.5px solid #DDDBD5; border-radius: 8px; padding: 7px 10px;
      font-size: 14px; color: var(--text); background: #F6F5F2; font-family: inherit; outline: none;
    }
    .diary-date-inp:focus { border-color: var(--navy); background: #fff; }
    .diary-ta {
      width: 100%; border: 1.5px solid #DDDBD5; border-radius: 9px; padding: 10px 12px;
      font-size: 14px; line-height: 1.55; color: var(--text); background: #F6F5F2;
      font-family: inherit; resize: none; min-height: 88px; outline: none;
    }
    .diary-ta:focus { border-color: var(--navy); background: #fff; }
    .diary-save {
      width: 100%; background: var(--navy); color: #fff; border: none;
      border-radius: var(--r-md); padding: 13px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 9px; font-family: inherit;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .diary-save:active { opacity: .85; }
    .diary-entry {
      background: var(--surface); border: 1px solid #DDDBD5;
      border-radius: var(--r-lg); padding: 13px 14px; margin-bottom: 8px;
    }
    .diary-entry-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .diary-entry-date { font-size: 13px; font-weight: 700; color: var(--text); }
    .diary-entry-wo { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
    .diary-entry-text { font-size: 14px; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
    .diary-del {
      background: none; border: none; color: #C0BDB6; font-size: 15px; cursor: pointer;
      padding: 0 0 0 8px; flex-shrink: 0; touch-action: manipulation;
    }
    .diary-del:active { color: var(--race-tx); }
    .diary-empty { text-align: center; padding: 32px 16px; color: var(--text3); font-size: 14px; }

    /* Week strip */
    .wrow {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 10px;
    }
    .wrow-day { width: 26px; font-size: 11px; font-weight: 600; color: var(--text3); flex-shrink: 0; }
    .wrow-ico { font-size: 14px; flex-shrink: 0; }
    .wrow-lbl { font-size: 13px; color: var(--text); flex: 1; }
    .wrow-dist { font-size: 12px; color: var(--text3); margin-left: auto; font-variant-numeric: tabular-nums; }

    /* ── Night mode (20:00 – 07:00) ────────────────── */
    html.dark {
      --bg:      #111827;
      --surface: #1F2937;
      --text:    #F9FAFB; --text2: #9CA3AF; --text3: #6B7280;
      --blue-bg: #1E3A5F; --blue-tx: #93C5FD; --blue-bd: #3B82F6;
      --grn-bg:  #450A0A; --grn-tx:  #FCA5A5; --grn-bd:  #EF4444;
      --grey-bg: #1F2937; --grey-tx: #9CA3AF; --grey-bd: #374151;
      --race-bg: #3B2100; --race-tx: #FDE68A; --race-bd: #EAB308;
      --done-bg: #052E16; --done-tx: #86EFAC; --done-bd: #22C55E;
      --ph1-bg:  #1E3A5F; --ph1-tx:  #93C5FD; --ph1-bd:  #3B82F6;
      --ph2-bg:  #052E16; --ph2-tx:  #86EFAC; --ph2-bd:  #22C55E;
      --ph3-bg:  #3B1F00; --ph3-tx:  #FED7AA; --ph3-bd:  #F97316;
      --ph4-bg:  #450A0A; --ph4-tx:  #FCA5A5; --ph4-bd:  #EF4444;
    }
    html.dark body { background: #111827; }
    html.dark .legend,
    html.dark .scard,
    html.dark .done-btn,
    html.dark .race-chip,
    html.dark #bottom-nav,
    html.dark .diary-entry,
    html.dark .diary-new       { border-color: #374151; }
    html.dark .var-btn         { background: #263548; border-color: #374151; }
    html.dark .diary-date-inp,
    html.dark .diary-ta        { background: #263548; border-color: #374151; }
    html.dark .done-check      { border-color: #4B5563; }
    html.dark .done-btn.done   { background: var(--done-bg); }
    html.dark .mnav-btn        { color: #93C5FD; }
    html.dark .mnav-btn:active:not(:disabled) { background: #263548; }
    html.dark .recovery-tag    { background: #3B1F00; color: #FED7AA; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-eye" id="hdr-eye">Half Marathon Plan</div>
    <div class="hdr-row">
      <div class="hdr-title" id="hdr-title">Training Calendar</div>
      <div class="hdr-countdown">
        <div class="hdr-days" id="hdr-days">—</div>
        <div class="hdr-dlabel">days to race</div>
      </div>
    </div>
  </header>

  <!-- Calendar view -->
  <div id="cal-view" class="view active">
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--blue-bg);border:1px solid var(--blue-bd)"></div>Run</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--grn-bg);border:1px solid var(--grn-bd)"></div>Strength</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--grey-bg);border:1px solid var(--grey-bd)"></div>Rest</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--race-bg);border:1px solid var(--race-bd)"></div>Race</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--done-bg);border:1px solid var(--done-bd)"></div>Done</div>
    </div>
    <div class="mnav">
      <button class="mnav-btn" id="prev-btn">&#8249;</button>
      <div class="mnav-title" id="mnav-title"></div>
      <button class="mnav-btn" id="next-btn">&#8250;</button>
    </div>
    <div class="dhdrs">
      <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
    </div>
    <div class="cgrid" id="cgrid"></div>
  </div>

  <!-- Progress view -->
  <div id="progress-view" class="view">
    <div id="progress-content"></div>
  </div>

  <!-- Diary view -->
  <div id="diary-view" class="view">
    <div class="diary-new">
      <div class="scard-lbl">New Entry</div>
      <div class="diary-row">
        <span class="diary-row-lbl">Date</span>
        <input type="date" id="diary-date-inp" class="diary-date-inp">
      </div>
      <textarea id="diary-ta" class="diary-ta" placeholder="How did the workout feel? What went well, what was hard?"></textarea>
      <button class="diary-save" onclick="saveDiaryEntry()">Save Entry</button>
    </div>
    <div class="sec-label" id="diary-count-lbl">Entries</div>
    <div id="diary-list"></div>
  </div>

  <!-- Detail view -->
  <div id="det-view">
    <div class="det-hbar">
      <button class="back-btn" id="back-btn">
        <svg width="8" height="13" viewBox="0 0 8 13" fill="none">
          <path d="M7 1L1 6.5L7 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Calendar
      </button>
      <div class="det-date" id="det-date"></div>
    </div>
    <div class="det-body" id="det-body"></div>
  </div>

  <!-- Bottom navigation -->
  <nav id="bottom-nav">

// ─────────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────────
let done = {};
let variants = {};
let diary = [];
let currentMonthIdx = 0;
let currentTab = 'schedule';
let detailDateKey = null;

const months = [];
(function(){
  const c = new Date(2026, 5, 1);
  while (c <= new Date(2026, 10, 1)) {
    months.push(new Date(c));
    c.setMonth(c.getMonth() + 1);
  }
})();

function loadState() {
  try { done     = JSON.parse(localStorage.getItem('hm26_done')     || '{}'); } catch(e){}
  try { variants = JSON.parse(localStorage.getItem('hm26_variants') || '{}'); } catch(e){}
  try { diary    = JSON.parse(localStorage.getItem('hm26_diary')    || '[]'); } catch(e){}
}
function saveDone()     { try { localStorage.setItem('hm26_done',     JSON.stringify(done));     } catch(e){} }
function saveVariants() { try { localStorage.setItem('hm26_variants', JSON.stringify(variants)); } catch(e){} }
function saveDiary()    { try { localStorage.setItem('hm26_diary',    JSON.stringify(diary));    } catch(e){} }

// ─────────────────────────────────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────────────────────────────────
function toKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function keyToDate(k) {
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y, m-1, d);
}
function weekDayDate(wi, di) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + wi*7 + di);
  return d;
}
function workoutForDate(date) {
  const ts = date.toDateString();
  for (let wi=0; wi<WEEKS.length; wi++) {
    for (let di=0; di<7; di++) {
      if (weekDayDate(wi,di).toDateString() === ts)
        return { wi, di, d: WEEKS[wi].days[di], w: WEEKS[wi] };
    }
  }
  return null;
}
function daysToRace() {
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.max(0, Math.ceil((RACE_DATE - t) / 86400000));
}
function intervalVarKey(detail) {
  if (detail.includes('5×1km')) return '5x1km';
  if (detail.includes('6×1km') && detail.includes('Stay sharp')) return '6x1km_taper';
  if (detail.includes('6×1km')) return '6x1km';
  if (detail.includes('7×1km')) return '7x1km';
  if (detail.includes('8×1km')) return '8x1km';
  if (detail.includes('4×1km')) return '4x1km';
  return null;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────────
//  RENDER CALENDAR
// ─────────────────────────────────────────────────────────────────
function renderCalendar() {
  const md = months[currentMonthIdx];
  const yr = md.getFullYear(), mo = md.getMonth();
  document.getElementById('mnav-title').textContent = `${MONTH_NAMES[mo]} ${yr}`;
  document.getElementById('prev-btn').disabled = currentMonthIdx === 0;
  document.getElementById('next-btn').disabled = currentMonthIdx === months.length-1;

  const today = new Date(); today.setHours(0,0,0,0);
  const first = new Date(yr, mo, 1);
  const last  = new Date(yr, mo+1, 0);
  let off = first.getDay() - 1; if (off < 0) off = 6;

  let html = '';
  for (let i=0; i<off; i++) html += '<div class="ccell" style="visibility:hidden"></div>';

  for (let d=1; d<=last.getDate(); d++) {
    const date = new Date(yr, mo, d);
    const dk   = toKey(date);
    const wo   = workoutForDate(date);
    const isDone = !!done[dk];
    const isToday = date.getTime() === today.getTime();

    let bg='transparent', bdc='transparent', txc='#B0AEA8', cls='ccell';
    if (wo) {
      cls += ' active';
      if (isDone) {
        bg='var(--done-bg)'; bdc='var(--done-bd)'; txc='var(--done-tx)';
      } else {
        const s = TYPE_STYLE[wo.d[0]];
        bg=s.bg; bdc=s.bd; txc=s.tx;
      }
    }
    if (isToday) cls += ' today-ring';

    const ico = wo
      ? (isDone ? '<div class="cico" style="font-size:12px;font-weight:800;color:var(--done-bd)">✓</div>'
                : `<div class="cico">${TYPE_STYLE[wo.d[0]].ico}</div>`)
      : '';

    html += `<div class="${cls}" style="background:${bg};border-color:${bdc}"
              ${wo ? `onclick="openDetail('${dk}')"` : ''}>
              <div class="cnum" style="color:${txc};font-weight:${isToday?800:500}">${d}</div>
              ${ico}
            </div>`;
  }
  document.getElementById('cgrid').innerHTML = html;
}

function renderPhases() {
  const html = PHASES.map(p =>
    `<div class="phase-card" style="background:${p.bg};border-color:${p.bd};color:${p.tx}">
      <div class="phase-card-row">
        <div class="phase-card-name">Phase ${p.id} — ${p.name}</div>
        <div class="phase-card-wks">Wks ${p.weeks}</div>
      </div>
      <div class="phase-card-desc">${p.desc}</div>
    </div>`
  ).join('');
  document.getElementById('phases-list').innerHTML = html;
}

function updateCountdown() {
  document.getElementById('hdr-days').textContent = daysToRace();
}

// ─────────────────────────────────────────────────────────────────
//  RENDER DETAIL
// ─────────────────────────────────────────────────────────────────
function openDetail(dk) {
  detailDateKey = dk;
  renderDetail();
  document.getElementById('det-view').classList.add('open');
  document.getElementById('det-view').scrollTop = 0;
}
function closeDetail() {
  document.getElementById('det-view').classList.remove('open');
  detailDateKey = null;
}

function renderDetail() {
  if (!detailDateKey) return;
  const date = keyToDate(detailDateKey);
  const wo = workoutForDate(date);
  if (!wo) return;

  const { wi, di, d, w } = wo;
  const [type, label, dist, pace, detail, rpe] = d;
  const s = TYPE_STYLE[type];
  const ph = PHASES.find(p => p.id === w.phase);
  const isDone = !!done[detailDateKey];
  const dayStr = `${DAY_NAMES[di]}, ${date.getDate()} ${MONTH_NAMES[date.getMonth()]}`;

  document.getElementById('det-date').textContent = dayStr;

  // Interval variations
  const varKey = label === 'Intervals' ? intervalVarKey(detail) : null;
  const vars   = varKey ? INTERVAL_VARS[varKey] : null;
  const varIdx = variants[detailDateKey] || 0;
  const displayDetail = (vars && vars[varIdx]) ? vars[varIdx].desc : detail;

  // Days to race from this workout day
  const dtRace = Math.max(0, Math.ceil((RACE_DATE - date) / 86400000));

  // Pills
  const pills = [dist, pace, rpe].filter(Boolean)
    .map(t => `<span class="pill">${esc(t)}</span>`).join('');

  // Variation picker HTML
  let varHtml = '';
  if (vars) {
    const btns = vars.map((v, i) => {
      const sel = i === varIdx;
      const borderColor = sel ? s.bd : '#DDDBD5';
      const bgColor = sel ? s.bg : '#F6F5F2';
      return `<button class="var-btn ${sel?'sel':''}"
        style="${sel ? `background:${bgColor};border-color:${borderColor}` : ''}"
        onclick="setVariant('${detailDateKey}',${i})">
        <span class="var-radio">${sel ? '●' : '○'}</span>
        <span class="var-name">${esc(v.name)}</span>
      </button>`;
    }).join('');
    varHtml = `<div class="scard">
      <div class="scard-lbl">Workout Variation</div>
      ${btns}
    </div>`;
  }

  // Week strip
  const weekRows = w.days.map((dd, ddi) => {
    const ds = TYPE_STYLE[dd[0]];
    const dayDate = weekDayDate(wi, ddi);
    const dayDk = toKey(dayDate);
    const dayDone = !!done[dayDk];
    const isThis = ddi === di;
    const rowBg = isThis ? `background:${ds.bg};border-radius:10px` : '';
    const lbl = dayDone
      ? `<span style="text-decoration:line-through;color:var(--done-bd);opacity:.75">${esc(dd[1])}</span>`
      : `<span style="color:${ds.tx}">${esc(dd[1])}</span>`;
    return `<div class="wrow" style="${rowBg}">
      <span class="wrow-day">${DAY_NAMES[ddi]}</span>
      <span class="wrow-ico">${dayDone ? '✅' : ds.ico}</span>
      <span class="wrow-lbl" style="font-weight:${isThis?700:400}">${lbl}</span>
      ${dd[2] ? `<span class="wrow-dist">${esc(dd[2])}</span>` : ''}
    </div>`;
  }).join('');

  document.getElementById('det-body').innerHTML = `
    <div class="wo-card" style="background:${s.bg};border-color:${s.bd};color:${s.tx}">
      <div class="wo-week-lbl">WEEK ${wi+1} · PHASE ${w.phase} — ${ph.name.toUpperCase()}</div>
      <div class="wo-title">${s.ico} ${esc(label)}</div>
      ${pills ? `<div class="pills">${pills}</div>` : ''}
    </div>

    ${varHtml}

    <div class="scard">
      <div class="scard-lbl">Workout Detail</div>
      <div class="scard-body">${esc(displayDetail)}</div>
    </div>

    <div class="ph-badge" style="background:${ph.bg};border-color:${ph.bd};color:${ph.tx}">
      <div class="ph-badge-name">Phase ${ph.id} — ${ph.name} &nbsp;·&nbsp; Wks ${ph.weeks}</div>
      <div class="ph-badge-desc">${ph.desc}</div>
      ${w.rec ? '<div class="recovery-tag">⚡ Recovery week — keep it easy</div>' : ''}
    </div>

    <button class="done-btn ${isDone?'done':''}" id="done-btn" onclick="toggleDone()">
      <div class="done-check">
        <span class="done-check-mark">✓</span>
      </div>
      <span class="done-lbl">${isDone ? 'Workout complete 🎉' : 'Mark as complete'}</span>
    </button>

    ${dtRace > 0 ? `<div class="race-chip">
      <span class="race-chip-lbl">Days to race day</span>
      <span class="race-chip-num">${dtRace}</span>
    </div>` : ''}

    <div class="scard">
      <div class="scard-lbl">This Week</div>
      ${weekRows}
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────────
//  ACTIONS
// ─────────────────────────────────────────────────────────────────
function toggleDone() {
  if (!detailDateKey) return;
  done[detailDateKey] = !done[detailDateKey];
  if (!done[detailDateKey]) delete done[detailDateKey];
  saveDone();
  renderDetail();
  renderCalendar();
}

function setVariant(dk, idx) {
  variants[dk] = idx;
  saveVariants();
  renderDetail();
}

function prevMonth() {
  if (currentMonthIdx > 0) { currentMonthIdx--; renderCalendar(); }
}
function nextMonth() {
  if (currentMonthIdx < months.length-1) { currentMonthIdx++; renderCalendar(); }
}

// ─────────────────────────────────────────────────────────────────
//  NIGHT MODE  (20:00 – 07:00)
// ─────────────────────────────────────────────────────────────────
function isNight() { const h = new Date().getHours(); return h >= 20 || h < 7; }
function applyTheme() { document.documentElement.classList.toggle('dark', isNight()); }

// ─────────────────────────────────────────────────────────────────
//  TAB NAVIGATION
// ─────────────────────────────────────────────────────────────────
const TAB_TITLES = { schedule: 'Training Calendar', progress: 'Your Progress', diary: 'Training Diary' };

function switchTab(tab) {
  document.getElementById('cal-view')     .classList.toggle('active', tab === 'schedule');
  document.getElementById('progress-view').classList.toggle('active', tab === 'progress');
  document.getElementById('diary-view')   .classList.toggle('active', tab === 'diary');
  document.getElementById('tab-schedule') .classList.toggle('active', tab === 'schedule');
  document.getElementById('tab-progress') .classList.toggle('active', tab === 'progress');
  document.getElementById('tab-diary')    .classList.toggle('active', tab === 'diary');
  document.getElementById('hdr-title').textContent = TAB_TITLES[tab];
  currentTab = tab;
  if (tab === 'progress') renderProgress();
  if (tab === 'diary')    renderDiary();
}

// ─────────────────────────────────────────────────────────────────
//  PROGRESS
// ─────────────────────────────────────────────────────────────────
function computeProgress() {
  const phaseStats = PHASES.map(ph => {
    let total = 0, doneCount = 0;
    for (let wi = 0; wi < WEEKS.length; wi++) {
      if (WEEKS[wi].phase !== ph.id) continue;
      for (let di = 0; di < 7; di++) {
        if (WEEKS[wi].days[di][0] === 'rest') continue;
        total++;
        if (done[toKey(weekDayDate(wi, di))]) doneCount++;
      }
    }
    return { ...ph, total, doneCount };
  });
  const totalAll = phaseStats.reduce((a, b) => a + b.total, 0);
  const doneAll  = phaseStats.reduce((a, b) => a + b.doneCount, 0);
  return { phaseStats, totalAll, doneAll };
}

function renderProgress() {
  const { phaseStats, totalAll, doneAll } = computeProgress();
  const pct = totalAll > 0 ? Math.round(doneAll / totalAll * 100) : 0;

  const phasesHtml = phaseStats.map(ph => {
    const phPct = ph.total > 0 ? Math.round(ph.doneCount / ph.total * 100) : 0;
    return `<div class="phase-prog" style="background:${ph.bg};border-color:${ph.bd};color:${ph.tx}">
      <div class="phase-prog-row">
        <div class="phase-prog-name">Phase ${ph.id} — ${ph.name}</div>
        <div class="phase-prog-count">Wks ${ph.weeks}</div>
      </div>
      <div class="phase-prog-desc">${esc(ph.desc)}</div>
      <div class="phase-prog-row" style="margin-bottom:5px">
        <span style="font-size:12px;opacity:.7">${ph.doneCount} / ${ph.total} workouts</span>
        <span style="font-size:12px;font-weight:700">${phPct}%</span>
      </div>
      <div class="pbar-bg"><div class="pbar-fill" style="width:${phPct}%;background:${ph.bd}"></div></div>
    </div>`;
  }).join('');

  document.getElementById('progress-content').innerHTML = `
    <div class="progress-hero">
      <div class="hero-pct">${pct}%</div>
      <div class="hero-lbl">Overall Completion</div>
      <div class="hero-bar-bg"><div class="hero-bar-fill" style="width:${pct}%"></div></div>
      <div class="hero-sub">${doneAll} of ${totalAll} workouts completed</div>
    </div>
    <div class="sec-label">By Phase</div>
    ${phasesHtml}
  `;
}

// ─────────────────────────────────────────────────────────────────
//  DIARY
// ─────────────────────────────────────────────────────────────────
function formatDiaryDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m-1, d);
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return `${dayNames[date.getDay()]}, ${d} ${MONTH_NAMES[m-1]} ${y}`;
}

function saveDiaryEntry() {
  const dateVal = document.getElementById('diary-date-inp').value;
  const text    = document.getElementById('diary-ta').value.trim();
  if (!dateVal || !text) return;
  diary.unshift({ id: Date.now(), date: dateVal, text });
  saveDiary();
  document.getElementById('diary-ta').value = '';
  renderDiary();
}

function deleteDiaryEntry(id) {
  diary = diary.filter(e => e.id !== id);
  saveDiary();
  renderDiary();
}

function renderDiary() {
  const inp = document.getElementById('diary-date-inp');
  if (!inp.value) inp.value = toKey(new Date());

  const sorted = [...diary].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  document.getElementById('diary-count-lbl').textContent =
    sorted.length > 0 ? `${sorted.length} ${sorted.length === 1 ? 'Entry' : 'Entries'}` : 'Entries';

  if (sorted.length === 0) {
    document.getElementById('diary-list').innerHTML =
      '<div class="diary-empty">No entries yet — write your first one above!</div>';
    return;
  }

  document.getElementById('diary-list').innerHTML = sorted.map(entry => {
    const wo = workoutForDate(keyToDate(entry.date));
    const woHtml = wo
      ? `<div class="diary-entry-wo">${TYPE_STYLE[wo.d[0]].ico} ${esc(wo.d[1])}${wo.d[2] ? ' · ' + wo.d[2] : ''} · Week ${WEEKS.indexOf(wo.w) + 1}</div>`
      : '';
    return `<div class="diary-entry">
      <div class="diary-entry-hdr">
        <div class="diary-entry-date">${formatDiaryDate(entry.date)}</div>
        <button class="diary-del" onclick="deleteDiaryEntry(${entry.id})">✕</button>
      </div>
      ${woHtml}
      <div class="diary-entry-text">${esc(entry.text)}</div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────────
(function init() {
  loadState();

  // Set initial month to today's month (or first month if past/future)
  const today = new Date();
  const idx = months.findIndex(m =>
    m.getMonth() === today.getMonth() && m.getFullYear() === today.getFullYear()
  );
  currentMonthIdx = idx >= 0 ? idx : 0;

  applyTheme();
  setInterval(applyTheme, 60000);

  updateCountdown();
  renderCalendar();

  document.getElementById('prev-btn').addEventListener('click', prevMonth);
  document.getElementById('next-btn').addEventListener('click', nextMonth);
  document.getElementById('back-btn').addEventListener('click', closeDetail);

  // Pre-fill diary date with today
  document.getElementById('diary-date-inp').value = toKey(today);

  // Swipe-right to close detail on mobile
  let touchStartX = 0;
  document.getElementById('det-view').addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.getElementById('det-view').addEventListener('touchend', e => {
    if (e.changedTouches[0].clientX - touchStartX > 60) closeDetail();
  }, { passive: true });
})();
</script>
